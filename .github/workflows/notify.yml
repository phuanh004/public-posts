name: Notify main site

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD | tr '\n' ',')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Send repository_dispatch to main site
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}
          repository: phuanh004/vickysold.com
          event-type: posts-updated
          client-payload: '{"changed_files": "${{ steps.changed.outputs.files }}"}'
